 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinVue Pro - Premium Mobile Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen antialiased px-4 py-6">

    <div class="max-w-md mx-auto space-y-6">
        
        <header class="bg-slate-900/80 border border-slate-800 p-5 rounded-2xl shadow-lg">
            <div class="flex items-center gap-2">
                <span class="h-2.5 w-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
                <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">FinVue Pro</h1>
            </div>
            <p class="text-slate-400 text-[11px] mt-0.5">Real-time Advanced Multi-Filter Ledger</p>
        </header>

        <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800 overflow-x-auto custom-scrollbar gap-1">
            <button onclick="setFilter('all')" id="btn-all" class="flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition bg-indigo-600 text-white shadow-md">All</button>
            <button onclick="setFilter('day')" id="btn-day" class="flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition text-slate-400">Today</button>
            <button onclick="setFilter('week')" id="btn-week" class="flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition text-slate-400">Weekly</button>
            <button onclick="setFilter('month')" id="btn-month" class="flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition text-slate-400">Monthly</button>
            <button onclick="setFilter('year')" id="btn-year" class="flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition text-slate-400">Yearly</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-xl shadow-md">
                <span id="label-income" class="text-[9px] font-bold text-emerald-400 uppercase tracking-wider">Income (All)</span>
                <h2 id="stat-income" class="text-lg font-bold mt-1 text-slate-100">₹0</h2>
            </div>
            <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-xl shadow-md">
                <span id="label-expense" class="text-[9px] font-bold text-rose-400 uppercase tracking-wider">Expense (All)</span>
                <h2 id="stat-expense" class="text-lg font-bold mt-1 text-slate-100">₹0</h2>
            </div>
            <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-xl shadow-md">
                <span class="text-[9px] font-bold text-sky-400 uppercase tracking-wider">Lena Hai</span>
                <h2 id="stat-receive" class="text-lg font-bold mt-1 text-slate-100">₹0</h2>
            </div>
            <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-xl shadow-md">
                <span class="text-[9px] font-bold text-amber-400 uppercase tracking-wider">Dena Hai</span>
                <h2 id="stat-pay" class="text-lg font-bold mt-1 text-slate-100">₹0</h2>
            </div>
        </div>

        <div class="bg-slate-900/80 border border-slate-800 p-5 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-3">
                <span id="chart-title" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Visual Chart (All Time)</span>
                <div class="flex gap-2 text-[8px] font-semibold uppercase">
                    <div class="flex items-center gap-1"><span class="w-2 h-2 bg-emerald-500 rounded-sm"></span><span class="text-slate-400">In</span></div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 bg-rose-500 rounded-sm"></span><span class="text-slate-400">Out</span></div>
                </div>
            </div>
            <div id="chart-container" class="h-28 flex items-end gap-6 border-b border-slate-800 pb-2 px-4">
                </div>
        </div>

        <div class="bg-slate-900/80 border border-slate-800 p-5 rounded-2xl shadow-lg">
            <h3 class="text-xs font-bold uppercase text-slate-300 mb-3">➕ Post Entry / Register Udhaar</h3>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] text-slate-400 font-medium mb-1">Entry Type</label>
                    <select id="tx-type" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-slate-200 focus:border-indigo-500 outline-none">
                        <option value="income">Income (+ Kamai)</option>
                        <option value="expense">Expense (- Kharcha)</option>
                        <option value="receive">Lena Hai (Khata Book - Asset)</option>
                        <option value="pay">Dena Hai (Khata Book - Liability)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-[10px] text-slate-400 font-medium mb-1">Description / Person Name</label>
                    <input type="text" id="tx-desc" placeholder="e.g., Salary, Food, Rahul, Amit" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-slate-200 focus:border-indigo-500 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 font-medium mb-1">Amount (₹)</label>
                        <input type="number" id="tx-amount" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-slate-200 focus:border-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 font-medium mb-1">Date</label>
                        <input type="date" id="tx-date" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-slate-200 focus:border-indigo-500 outline-none">
                    </div>
                </div>
                
                <button type="button" onclick="handleFormSubmit()" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs uppercase p-3 rounded-xl shadow-md transition active:scale-[0.98] cursor-pointer">
                    Save Transaction
                </button>
            </div>
        </div>

        <div class="bg-slate-900/80 border border-slate-800 p-5 rounded-2xl shadow-lg">
            <h3 class="text-xs font-bold uppercase text-slate-300 mb-3 flex justify-between items-center">
                <span>📊 Core Ledger Stream</span>
                <span id="badge-filter" class="text-[9px] lowercase bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded-md border border-indigo-500/20">all items</span>
            </h3>
            <div id="ledger-list" class="space-y-2 max-h-56 overflow-y-auto custom-scrollbar">
                </div>
        </div>

        <div class="bg-slate-900/80 border border-slate-800 p-5 rounded-2xl shadow-lg">
            <h3 class="text-xs font-bold uppercase text-slate-300 mb-3">🤝 Active Len-Den (Khata Book)</h3>
            <div id="khata-list" class="space-y-2 max-h-56 overflow-y-auto custom-scrollbar">
                </div>
        </div>

    </div>

    <script>
        let coreDatabase = [];
        let currentFilter = 'all';

        // High Protection Fail-safe Parser Engine
        try {
            const rawData = localStorage.getItem('finvue_v4_master');
            if (rawData) {
                coreDatabase = JSON.parse(rawData);
            }
        } catch(e) {
            console.warn("Storage restricted. Virtual Memory Engine engaged.");
        }

        if (!Array.isArray(coreDatabase)) coreDatabase = [];

        // Dynamic local clock baseline anchor
        document.getElementById('tx-date').value = new Date().toLocaleDateString('sv').split(' ')[0];

        function handleFormSubmit() {
            const type = document.getElementById('tx-type').value;
            const desc = document.getElementById('tx-desc').value.trim();
            const amount = parseFloat(document.getElementById('tx-amount').value);
            let date = document.getElementById('tx-date').value;

            if (!desc || isNaN(amount) || amount <= 0) {
                alert("Please fill description and valid positive amount.");
                return;
            }
            if (!date) date = new Date().toLocaleDateString('sv').split(' ')[0];

            coreDatabase.push({
                id: `${Date.now()}-${Math.random().toString(36).substring(2,7)}`,
                type: type,
                desc: desc,
                amount: amount,
                date: date
            });

            saveAndRebootUI();

            // Clear Input Elements
            document.getElementById('tx-desc').value = '';
            document.getElementById('tx-amount').value = '';
        }

        function deleteItem(id) {
            coreDatabase = coreDatabase.filter(item => item.id !== id);
            saveAndRebootUI();
        }

        // 🤝 KHATA CLEAR SETTLEMENT FUNCTION 
        function clearKhataItem(id) {
            // Khata account remove karke realtime variables recalculate karne ke liye
            coreDatabase = coreDatabase.filter(item => item.id !== id);
            saveAndRebootUI();
        }

        function saveAndRebootUI() {
            try {
                localStorage.setItem('finvue_v4_master', JSON.stringify(coreDatabase));
            } catch(e) {}
            syncPipeline();
        }

        function setFilter(type) {
            currentFilter = type;
            const filterButtons = ['all', 'day', 'week', 'month', 'year'];
            filterButtons.forEach(f => {
                const btn = document.getElementById(`btn-${f}`);
                if (btn) {
                    btn.className = (f === type)
                        ? "flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition bg-indigo-600 text-white shadow-md"
                        : "flex-1 min-w-[65px] text-center py-2 rounded-lg text-[11px] font-semibold transition text-slate-400";
                }
            });
            syncPipeline();
        }

        // Timeframe Multi-Engine Filter Matrix Validation
        function evaluateTimeframeMatch(itemDateStr) {
            if (currentFilter === 'all') return true;

            // Strict conversion string to local date object mapping
            const parts = itemDateStr.split('-');
            const recordDate = new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0, 0);

            const today = new Date();
            today.setHours(0,0,0,0);

            if (currentFilter === 'day') {
                return recordDate.getTime() === today.getTime();
            }
            if (currentFilter === 'week') {
                const boundary = new Date(today);
                boundary.setDate(today.getDate() - 7);
                return recordDate >= boundary && recordDate <= today;
            }
            if (currentFilter === 'month') {
                return recordDate.getMonth() === today.getMonth() && recordDate.getFullYear() === today.getFullYear();
            }
            if (currentFilter === 'year') {
                return recordDate.getFullYear() === today.getFullYear();
            }
            return true;
        }

        function syncPipeline() {
            // 1. Separate contexts cleanly
            const ledgerTypes = ['income', 'expense'];
            const khataTypes = ['receive', 'pay'];

            // Filter ledger dataset in real time
            const filteredLedger = coreDatabase.filter(item => ledgerTypes.includes(item.type) && evaluateTimeframeMatch(item.date));
            
            // Khata Book calculation is global tracking (independent of transaction time tabs)
            const activeKhata = coreDatabase.filter(item => khataTypes.includes(item.type));

            // 2. Calculations parameters
            let inc = filteredLedger.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            let exp = filteredLedger.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            
            let rec = activeKhata.filter(u => u.type === 'receive').reduce((s, u) => s + u.amount, 0);
            let pay = activeKhata.filter(u => u.type === 'pay').reduce((s, u) => s + u.amount, 0);

            // Update Text Nodes
            const filterLabelText = currentFilter === 'all' ? 'All' : currentFilter.toUpperCase();
            document.getElementById('label-income').innerText = `Income (${filterLabelText})`;
            document.getElementById('label-expense').innerText = `Expense (${filterLabelText})`;
            document.getElementById('badge-filter').innerText = `${currentFilter} view state`;
            document.getElementById('chart-title').innerText = `Visual Ratio (${filterLabelText})`;

            document.getElementById('stat-income').innerText = `₹${inc.toLocaleString('en-IN')}`;
            document.getElementById('stat-expense').innerText = `₹${exp.toLocaleString('en-IN')}`;
            document.getElementById('stat-receive').innerText = `₹${rec.toLocaleString('en-IN')}`;
            document.getElementById('stat-pay').innerText = `₹${pay.toLocaleString('en-IN')}`;

            // 3. Vector Graph Realtime Renderer
            const totalScaleMax = Math.max(inc, exp, 1);
            const incPercentage = (inc / totalScaleMax) * 100;
            const expPercentage = (exp / totalScaleMax) * 100;

            document.getElementById('chart-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-end h-full group">
                    <div style="height: ${incPercentage}%" class="w-full max-w-[45px] bg-emerald-500 rounded-t-md min-h-[4px] shadow-[0_0_10px_rgba(16,185,129,0.2)] transition-all duration-500"></div>
                    <span class="text-[9px] text-slate-400 mt-1.5 font-medium">In (${Math.round(incPercentage)}%)</span>
                </div>
                <div class="flex-1 flex flex-col items-center justify-end h-full group">
                    <div style="height: ${expPercentage}%" class="w-full max-w-[45px] bg-rose-500 rounded-t-md min-h-[4px] shadow-[0_0_10px_rgba(244,63,94,0.2)] transition-all duration-500"></div>
                    <span class="text-[9px] text-slate-400 mt-1.5 font-medium">Out (${Math.round(expPercentage)}%)</span>
                </div>
            `;

            // 4. Render Ledger Feed
            const ledgerElement = document.getElementById('ledger-list');
            if (filteredLedger.length === 0) {
                ledgerElement.innerHTML = `<p class="text-slate-600 text-center text-[11px] py-6">No records match this selected filter timeframe.</p>`;
            } else {
                const orderedLedger = [...filteredLedger].reverse();
                ledgerElement.innerHTML = orderedLedger.map(item => `
                    <div class="flex justify-between items-center bg-slate-950/40 border border-slate-800/80 p-3 rounded-xl">
                        <div class="max-w-[70%] truncate">
                            <p class="text-xs font-semibold text-slate-200 truncate">${item.desc}</p>
                            <span class="text-[9px] text-slate-500">${item.date}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold ${item.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">
                                ${item.type === 'income' ? '+' : '-'}₹${item.amount.toLocaleString('en-IN')}
                            </span>
                            <button onclick="deleteItem('${item.id}')" class="text-slate-600 hover:text-rose-400 text-xs p-1 ml-1">✕</button>
                        </div>
                    </div>
                `).join('');
            }

            // 5. Render Khata Book Feed with Clear Trigger Hook
            const khataElement = document.getElementById('khata-list');
            if (activeKhata.length === 0) {
                khataElement.innerHTML = `<p class="text-slate-600 text-center text-[11px] py-6">No pending credits or debits registered.</p>`;
            } else {
                const orderedKhata = [...activeKhata].reverse();
                khataElement.innerHTML = orderedKhata.map(item => `
                    <div class="flex justify-between items-center bg-slate-950/40 border border-slate-800/80 p-3 rounded-xl">
                        <div>
                            <p class="text-xs font-semibold text-slate-200">${item.desc}</p>
                            <span class="text-[9px] inline-block mt-0.5 px-2 py-0.2 rounded font-medium ${item.type === 'receive' ? 'text-sky-400 bg-sky-500/10' : 'text-amber-400 bg-amber-500/10'}">
                                ${item.type === 'receive' ? 'Lena Hai' : 'Dena Hai'}
                            </span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold ${item.type === 'receive' ? 'text-sky-400' : 'text-amber-400'}">
                                ₹${item.amount.toLocaleString('en-IN')}
                            </span>
                            <button onclick="clearKhataItem('${item.id}')" class="bg-slate-900 hover:bg-emerald-500/20 text-emerald-400 border border-slate-800 text-[10px] font-semibold px-2 py-1 rounded-lg transition">
                                ✓ Clear
                            </button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Bootstrap Core Render Core Execution
        syncPipeline();
    </script>
</body>
</html>
